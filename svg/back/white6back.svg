<svg width="400" height="560" viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
  <!-- 撲克牌背景 -->
  <rect width="400" height="560" rx="20" fill="white" stroke="#2a4b8d" stroke-width="2"/>
  
  <!-- 內層虛線邊框 -->
  <rect x="25" y="25" width="350" height="510" rx="15" fill="none" stroke="#2a4b8d" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- 主要藍色編織圖案區域 (簡化為編織紋理) -->
  <defs>
    <pattern id="basketweave" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 0 5 L 10 5 M 5 0 L 5 10" stroke="#2a4b8d" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>
  <rect x="40" y="40" width="320" height="480" rx="10" fill="url(#basketweave)" stroke="#2a4b8d" stroke-width="2"/>
  
  <!-- 中央羅盤玫瑰 (簡化圖案) -->
  <g transform="translate(200, 280)">
    <circle r="45" fill="white" stroke="#2a4b8d" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#2a4b8d" stroke-width="1"/>
    <!-- 羅盤指針 -->
    <path d="M 0 -35 L 5 0 L 0 35 L -5 0 Z" fill="#2a4b8d"/>
    <path d="M -35 0 L 0 -5 L 35 0 L 0 5 Z" fill="#2a4b8d"/>
    <!-- 對角線指針 -->
    <path d="M -25 -25 L 0 -3 L 25 25 L 0 3 Z" fill="#2a4b8d" opacity="0.7"/>
    <path d="M 25 -25 L 3 -0 L -25 25 L -3 0 Z" fill="#2a4b8d" opacity="0.7"/>
    <!-- 方向文字 (簡化) -->
    <text x="0" y="-48" text-anchor="middle" font-family="serif" font-size="12" fill="#2a4b8d">N</text>
    <text x="48" y="4" text-anchor="middle" font-family="serif" font-size="12" fill="#2a4b8d">E</text>
    <text x="0" y="58" text-anchor="middle" font-family="serif" font-size="12" fill="#2a4b8d">S</text>
    <text x="-48" y="4" text-anchor="middle" font-family="serif" font-size="12" fill="#2a4b8d">W</text>
  </g>
  
  <!-- 上方星座 (簡化圖案) -->
  <g transform="translate(200, 100)">
    <circle r="25" fill="#2a4b8d"/>
    <!-- 星星 -->
    <circle cx="0" cy="-10" r="2" fill="white"/>
    <circle cx="10" cy="0" r="1.5" fill="white"/>
    <circle cx="-10" cy="5" r="1.5" fill="white"/>
    <circle cx="5" cy="12" r="1" fill="white"/>
    <circle cx="-5" cy="-5" r="1" fill="white"/>
  </g>
  
  <!-- 下方星座 (簡化圖案) -->
  <g transform="translate(200, 460)">
    <circle r="25" fill="#2a4b8d"/>
    <!-- 星星 -->
    <circle cx="-10" cy="-10" r="2" fill="white"/>
    <circle cx="0" cy="0" r="1.5" fill="white"/>
    <circle cx="10" cy="5" r="1.5" fill="white"/>
    <circle cx="-5" cy="10" r="1" fill="white"/>
    <circle cx="8" cy="-5" r="1" fill="white"/>
  </g>
  
  <!-- 四角六分儀圖案 (簡化) -->
  <defs>
    <g id="sextant_icon">
      <path d="M 0 0 L 20 0 A 20 20 0 0 1 0 20 Z" fill="none" stroke="#2a4b8d" stroke-width="1.5"/>
      <circle cx="5" cy="5" r="1" fill="#2a4b8d"/>
      <line x1="0" y1="0" x2="15" y2="15" stroke="#2a4b8d" stroke-width="1"/>
    </g>
  </defs>
  
  <use href="#sextant_icon" transform="translate(45, 45) rotate(0)"/>
  <use href="#sextant_icon" transform="translate(355, 45) rotate(90) scale(-1, 1)"/>
  <use href="#sextant_icon" transform="translate(45, 515) rotate(-90) scale(1, -1)"/>
  <use href="#sextant_icon" transform="translate(355, 515) rotate(180)"/>
  
</svg>
