<svg width="400" height="560" viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
  <!-- 定義背景紋理 -->
  <defs>
    <pattern id="stamp-dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#4B3D7A" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- 郵票鋸齒邊緣感背景 -->
  <rect width="400" height="560" fill="white" />
  <rect x="10" y="10" width="380" height="540" fill="none" stroke="#4B3D7A" stroke-width="1" stroke-dasharray="2,2" />

  <!-- 主體深色區域 -->
  <rect x="25" y="25" width="350" height="450" fill="#4B3D7A" />
  
  <!-- 八角形裝飾邊框 -->
  <path d="M 60,40 L 340,40 L 375,75 L 375,425 L 340,460 L 60,460 L 25,425 L 25,75 Z" fill="none" stroke="white" stroke-width="2" />
  
  <!-- 內部藤蔓底紋模擬 (簡化版古典花紋) -->
  <g opacity="0.3">
    <pattern id="scrollwork" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M20,0 Q30,10 20,20 T20,40 M0,20 Q10,30 20,20 T40,20" fill="none" stroke="white" stroke-width="0.5"/>
        <circle cx="20" cy="20" r="2" fill="white"/>
    </pattern>
    <path d="M 65,45 L 335,45 L 370,80 L 370,420 L 335,455 L 65,455 L 30,420 L 30,80 Z" fill="url(#scrollwork)" />
  </g>

  <!-- 白六的古典風格剪影 (置中對稱設計) -->
  <g transform="translate(200, 240) scale(1.5)">
    <!-- 頭部與身體輪廓 -->
    <path d="M-30,50 Q-25,55 0,40 T30,0 Q30,-20 15,-25 T-5,-25 Q-20,-20 -25,-5 Z" fill="white" />
    <!-- 招牌立耳 -->
    <path d="M-15,-25 L-20,-55 L-5,-20 Z" fill="white" />
    <path d="M5,-25 L12,-55 L20,-20 Z" fill="white" />
    <!-- 吻部 -->
    <path d="M15,-5 L45,5 Q50,8 45,15 L15,25 Z" fill="white" />
    <!-- 黑色細節 -->
    <circle cx="45" cy="8" r="2" fill="#4B3D7A" /> <!-- 鼻子 -->
    <circle cx="10" cy="-5" r="2" fill="#4B3D7A" /> <!-- 眼睛 -->
    <!-- 頸部裝飾線條 -->
    <path d="M-25,30 Q0,40 25,20" fill="none" stroke="#4B3D7A" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- 下方文字區域 (模仿郵票格式) -->
  <rect x="25" y="480" width="350" height="60" fill="white" stroke="#4B3D7A" stroke-width="2" />
  <text x="40" y="515" fill="#4B3D7A" font-family="serif" font-weight="bold" font-size="28">白六占卜</text>
  <text x="355" y="525" text-anchor="end" fill="#4B3D7A" font-family="Arial" font-weight="bold" font-size="48">100</text>
  <text x="40" y="535" fill="#4B3D7A" font-family="Arial" font-size="10" letter-spacing="1">WHITE SIX DIVINATION POKER</text>
</svg>
